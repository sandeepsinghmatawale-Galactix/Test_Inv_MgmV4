<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Session Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Liquor Inventory Dashboard</span>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4">Current Session Dashboard</h2>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow p-4 text-center bg-primary text-white">
                <h3>Stockroom Inventory</h3>
                <p>Enter stockroom closing stock</p>
                <a th:href="@{/stockroom/{id}(id=${sessionId})}" class="btn btn-light">
                    Open Stockroom
                </a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center bg-warning text-dark">
                <h3>Distribution</h3>
                <p>Distribute stock to wells</p>
                <a th:href="@{/distribution/create-page/{id}(id=${sessionId})}" class="btn btn-dark">
                    Open Distribution
                </a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center bg-success text-white">
                <h3>Well Inventory</h3>
                <p>Manage well stock</p>
                <a th:href="@{/well/select/{id}(id=${sessionId})}" class="btn btn-light">
                    Open Wells
                </a>
            </div>
        </div>

    </div>
</div>

</body>
</html>
