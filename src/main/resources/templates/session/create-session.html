<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Session</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="gradient-bg">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Liquor Inventory System</span>
    </div>
</nav>

<div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="card p-5 shadow-lg session-card">
        <h2 class="text-center mb-4">Create Inventory Session</h2>

        <form th:action="@{/sessions/create}" method="post">
            <div class="mb-3">
                <label class="form-label">Session Name</label>
                <select name="sessionName" class="form-select">
                    <option>Morning Session</option>
                    <option>Afternoon Session</option>
                    <option>Night Session</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Start Session
            </button>
        </form>
    </div>
</html>
