<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Well Inventory</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
        function calculateWellSale(row) {
            let opening = parseInt(row.querySelector('.opening').value) || 0;
            let received = parseInt(row.querySelector('.received').value) || 0;
            let closing = parseInt(row.querySelector('.closing').value) || 0;

            row.querySelector('.sale').value = (opening + received) - closing;
        }

        function initSales() {
            document.querySelectorAll("tbody tr").forEach(row => {
                calculateWellSale(row);
            });
        }

        window.onload = initSales;
    </script>

    <style>
        body {
            background-color: #f8f9fa;
        }

        .card {
            border-radius: 12px;
        }

        .table td, .table th {
            vertical-align: middle;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>🧾 Well Closing Entry</h3>

            <a th:href="@{'/well/select/' + ${sessionId}}"
               class="btn btn-secondary">
                ← Back to Wells
            </a>
        </div>

        <!-- INFO -->
        <div class="alert alert-info">
            After saving, you will be redirected to the next pending well automatically.
        </div>

        <!-- FORM -->
        <form th:action="@{/well/closing/{sessionId}/{wellId}
                (sessionId=${sessionId}, wellId=${wellId})}"
              method="post">

            <table class="table table-bordered">

                <thead class="table-dark">
                <tr>
                    <th>Brand</th>
                    <th>Opening</th>
                    <th>Received</th>
                    <th>Closing</th>
                    <th>Sale</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="item : ${wellInventory}"
                    th:classappend="${item.status.name() == 'COMPLETED'} ? 'table-success'">

                    <!-- BRAND -->
                    <td>
                        <span th:text="${item.brand.brandName}"></span>

                        <input type="hidden"
                               name="brandId"
                               th:value="${item.brand.brandId}">
                    </td>

                    <!-- OPENING -->
                    <td>
                        <input class="form-control opening"
                               th:value="${item.openingStock}"
                               readonly>
                    </td>

                    <!-- RECEIVED -->
                    <td>
                        <input class="form-control received"
                               th:value="${item.receivedStock}"
                               readonly>
                    </td>

                    <!-- CLOSING -->
                    <td>
                        <input class="form-control closing"
                               name="closingStock"
                               type="number"
                               min="0"
                               required
                               th:readonly="${item.status.name() == 'COMPLETED'}"
                               oninput="calculateWellSale(this.closest('tr'))">
                    </td>

                    <!-- SALE -->
                    <td>
                        <input class="form-control sale" readonly>
                    </td>

                </tr>

                </tbody>

            </table>

            <button type="submit" class="btn btn-success w-100">
                Save & Continue →
            </button>

        </form>

    </div>

</div>

</body>
</html>
