<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Well Inventory</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <script>
        function calculateRow(row) {
            let opening = parseInt(row.querySelector('.opening').value) || 0;
            let received = parseInt(row.querySelector('.received').value) || 0;
            let closing = parseInt(row.querySelector('.closing').value) || 0;
            let price = parseFloat(row.querySelector('.price').value) || 0;

            let sale = (opening + received) - closing;
            let amount = sale * price;

            row.querySelector('.sale').value = sale;
            row.querySelector('.amount').value = amount.toFixed(2);
        }

        function initRows() {
            document.querySelectorAll("tbody tr").forEach(row => {
                calculateRow(row);
            });
        }

        window.onload = initRows;
    </script>

    <style>
        body { background: #f5f7fb; }
        .card { border-radius: 16px; }
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: white;
            border-bottom: 1px solid #eee;
        }
        .badge-completed { background: #198754; }
        .badge-progress { background: #ffc107; color: black; }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="sticky-header py-3 px-4 shadow-sm">
    <div class="d-flex justify-content-between align-items-center">

        <div>
            <h4 class="mb-0">🧾 Well Closing Entry</h4>
            <small>
                Bar: <b th:text="${barId}"></b> |
                Session: <b th:text="${sessionId}"></b>
            </small>
        </div>

        <div class="d-flex gap-2">
          <a th:href="@{'/well/select/' + ${sessionId}}"
               class="btn btn-outline-secondary">
                ← Back
            </a>

            <a th:href="@{'/sessions/summary/' + ${sessionId}}"
               class="btn btn-primary">
                Report
            </a>
        </div>

    </div>
</div>

<!-- MAIN -->
<div class="container mt-4">

    <!-- PROGRESS -->
    <div class="card p-3 mb-3">
        <div class="d-flex justify-content-between">
            <span>Progress</span>
            <span th:text="${progress + '%'}"></span>
        </div>
        <div class="progress mt-2">
            <div class="progress-bar bg-success"
                 th:style="'width:' + ${progress} + '%'"></div>
        </div>
    </div>

    <!-- FORM -->
    <div class="card p-3 shadow">

		<form th:action="@{/well/closing/{sessionId}/{wellId}
		    (sessionId=${sessionId}, wellId=${wellId})}"
              method="post">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">
                    <tr>
                        <th>Brand</th>
                        <th>Opening</th>
                        <th>Received</th>
                        <th>Closing</th>
                        <th>Sale</th>
                        <th>Price (₹)</th>
                        <th>Amount (₹)</th>
                        <th>Status</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="item : ${wellInventory}">

                        <!-- BRAND -->
                        <td>
                            <span th:text="${item.brand.brandName}"></span>
                            <input type="hidden" name="brandId"
                                   th:value="${item.brand.brandId}">
                        </td>

                        <!-- OPENING -->
                        <td>
                            <input class="form-control opening"
                                   th:value="${item.openingStock}" readonly>
                        </td>

                        <!-- RECEIVED -->
                        <td>
                            <input class="form-control received"
                                   th:value="${item.receivedStock}" readonly>
                        </td>

                        <!-- CLOSING -->
                        <td>
                            <input class="form-control closing"
                                   name="closingStock"
                                   type="number"
                                   min="0"
                                   th:readonly="${item.status.name() == 'COMPLETED'}"
                                   oninput="calculateRow(this.closest('tr'))"
                                   required>
                        </td>

                        <!-- SALE -->
                        <td>
                            <input class="form-control sale" readonly>
                        </td>

                        <!-- PRICE -->
                        <td>
                            <input class="form-control price"
                                   th:value="${priceMap[item.brand.brandId]}"
                                   readonly>
                        </td>

                        <!-- AMOUNT -->
                        <td>
                            <input class="form-control amount" readonly>
                        </td>

                        <!-- STATUS -->
                        <td>
                            <span th:if="${item.status.name() == 'COMPLETED'}"
                                  class="badge badge-completed">
                                Completed
                            </span>

                            <span th:if="${item.status.name() != 'COMPLETED'}"
                                  class="badge badge-progress">
                                In Progress
                            </span>
                        </td>

                    </tr>

                    </tbody>
                </table>

            </div>

            <button class="btn btn-success w-100 mt-3">
                Save & Continue →
            </button>

        </form>

    </div>

</div>

</body>
</html>
