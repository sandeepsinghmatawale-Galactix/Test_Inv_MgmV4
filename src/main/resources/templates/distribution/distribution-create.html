<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Distribution</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Distribution Management</span>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow p-5 text-center">

        <h2>Create Distribution Batch</h2>
        <p class="text-muted">
            Create batch for transferring stockroom sales to wells
        </p>

        <form th:action="@{/distribution/create/{id}(id=${sessionId})}" method="post">
            <button type="submit" class="btn btn-warning btn-lg w-100">
                Create Distribution Batch
            </button>
        </form>

    </div>

</div>

</body>
</html>
